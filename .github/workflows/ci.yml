name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Run unit tests
        run: bun run test

      - name: Upload unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: 'test-results/junit.xml'
          reporter: 'jest-junit'
          fail-on-error: false
          fail-on-empty: false

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload E2E test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Tests
          path: 'test-results/e2e-junit.xml'
          reporter: 'java-junit'
          fail-on-error: false
          fail-on-empty: false

      - name: Build
        run: bun run build
